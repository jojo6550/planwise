services:
  - type: web
    name: planwise
    env: php
    buildCommand: | 
      composer install --no-dev --optimize-autoloader
    startCommand: php -S 0.0.0.0:$PORT public/index.php
    rootDir: public/
    plan: free
    envVars:
      - key: APP_URL
        value: https://planwise-1.onrender.com/
      - fromDatabase:
          - POSTGRES_URL
          - POSTGRES_PASSWORD
